; PlatformIO Project Configuration File
; CoreS3 IoT Camera Platform

[env]
platform = espressif32@6.1.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = ./partitions_ffat.csv
build_flags =
	-std=c++11
	-DBOARD_HAS_PSRAM
	-DCORE_DEBUG_LEVEL=3
	-Iinclude
	-DLV_CONF_INCLUDE_SIMPLE
	-DLV_LVGL_H_INCLUDE_SIMPLE
	-DLCD_HEIGHT=240
	-DLCD_WIDTH=320
	-DLV_TICK_PERIOD_MS=10
	-DFACTORY_TEST=1
	-DCONFIG_CAMERA_TASK_STACK_SIZE=4096
		-DARDUINO_USB_MODE=1
		-DARDUINO_USB_CDC_ON_BOOT=1

		-DUSBSerial=Serial

lib_deps =
	m5stack/M5GFX@^0.1.6
	m5stack/M5Unified@^0.1.6
	lvgl/lvgl@^8.3.4
	espressif/esp32-camera@^2.0.0
	bblanchon/ArduinoJson@^6.21.3

[env:M5CoreS3]
build_type = debug
build_flags =
	${env.build_flags}
	-DM5CORES3
	-Og
	-ggdb3
	-fno-lto
	; HTTP buffer overflow symbols
	-Wl,-u,unlockAdmin
	-Wl,-u,defaultExposureHandler
	; I2C secure element overflow symbols
	-Wl,-u,i2c_admin_unlock
	-Wl,-u,i2c_default_handler
	; SPI DMA overflow symbols
	-Wl,-u,spi_admin_unlock
	-Wl,-u,spi_default_handler
	; BLE GATT overflow symbols
	-Wl,-u,ble_config_unlock
	-Wl,-u,ble_default_handler
debug_tool = esp-builtin
debug_init_break = tbreak app_main
monitor_speed = 115200
upload_speed = 460800

[env:M5CoreS3_test]
platform = espressif32@6.1.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = ./partitions_ffat.csv
test_framework = unity
test_build_src = yes
test_filter = test_*
monitor_speed = 115200
upload_speed = 460800
build_flags =
	${env.build_flags}
	-DUNIT_TEST
		-DDEV_TEST_HOOKS
build_src_filter =
	+<*>
	-<main.cpp>
lib_deps =
	${env.lib_deps}
	throwtheswitch/Unity@^2.5.2


[env:M5CoreS3_debug]
build_type = debug
build_flags =
    ${env.build_flags}
    -DM5CORES3
    -DDEV_TEST_HOOKS
    -Og
    -ggdb3
    -fno-lto
    ; HTTP buffer overflow symbols
    -Wl,-u,unlockAdmin
    -Wl,-u,defaultExposureHandler
    ; I2C secure element overflow symbols
    -Wl,-u,i2c_admin_unlock
    -Wl,-u,i2c_default_handler
    ; SPI DMA overflow symbols
    -Wl,-u,spi_admin_unlock
    -Wl,-u,spi_default_handler
    ; BLE GATT overflow symbols
    -Wl,-u,ble_config_unlock
    -Wl,-u,ble_default_handler
debug_tool = esp-builtin
debug_init_break = tbreak app_main
monitor_speed = 115200
upload_speed = 460800
